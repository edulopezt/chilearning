name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # El nombre "checks" es load-bearing: el ruleset de protección de main lo
  # exige como status check. No renombrar sin actualizar el ruleset.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6 # lee packageManager de package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build
      # El bundle del worker (task 2.6) solo se construía en el docker build de
      # Coolify: sin esto, una regresión de bundling se descubría recién al
      # desplegar. Smoke: el bundle debe CARGAR y abortar limpio sin REDIS_URL.
      - run: pnpm build:worker
      - name: Worker bundle smoke (loads and aborts cleanly without REDIS_URL)
        run: |
          set +e
          output=$(node dist/worker/index.js 2>&1)
          code=$?
          echo "$output"
          [ $code -eq 1 ] && echo "$output" | grep -q "falta la variable de entorno REDIS_URL"

  # Aislamiento multi-tenant (RNF-1, P2): cualquier fuga rompe el build.
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start local Supabase (migrations + seeds)
        run: supabase start -x realtime,storage-api,imgproxy,studio,edge-runtime,logflare,vector,supavisor
      - run: pnpm test:rls
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  # Motor SENCE contra el mock RCE local (tarea 0.6/0.7): corre SIN internet.
  # Necesita Supabase local (la suite del motor persiste en BD).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      # storage-api ON: las tareas (task 2.2) suben archivos a un bucket y la
      # suite ejerce upload + signed URL. imgproxy queda fuera (solo lo usan las
      # transformaciones de imagen, que no tocamos).
      - name: Start local Supabase (migrations + seeds)
        run: supabase start -x realtime,imgproxy,studio,edge-runtime,logflare,vector,supavisor
      - run: pnpm test:integration
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  # E2E de los 3 flujos críticos (task 3.8, Plan §11): app real + Supabase local +
  # mock SENCE, login real por UI, desktop + móvil. Blinda los merges (anti-#41).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright (chromium + deps)
        run: pnpm exec playwright install --with-deps chromium
      - name: Start local Supabase (migrations + seeds)
        run: supabase start -x realtime,imgproxy,studio,edge-runtime,logflare,vector,supavisor
      - name: Export env (app → Supabase local)
        run: |
          eval "$(supabase status -o env | sed 's/^/export SB_/')"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$SB_API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SB_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SB_SERVICE_ROLE_KEY"
            echo "TENANT_ROOT_DOMAIN=localtest.me"
            echo "SENCE_ENV=mock"
            echo "SENCE_MOCK_URL=http://127.0.0.1:4010"
            echo "SENCE_TOKEN_ENCRYPTION_KEY=Zm9vYmFyMDEyMzQ1Njc4OWFiY2RlZmdoaWprbG1ub3A="
          } >> "$GITHUB_ENV"
      - name: Build app
        run: pnpm build
      - name: Run E2E (desktop + mobile)
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
