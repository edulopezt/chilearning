name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # El nombre "checks" es load-bearing: el ruleset de protección de main lo
  # exige como status check. No renombrar sin actualizar el ruleset.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # lee packageManager de package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build

  # Aislamiento multi-tenant (RNF-1, P2): cualquier fuga rompe el build.
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start local Supabase (migrations + seeds)
        run: supabase start -x realtime,storage-api,imgproxy,studio,edge-runtime,logflare,vector,supavisor
      - run: pnpm test:rls
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  # Jobs futuros los agrega su tarea: integration (0.6, requiere mock RCE),
  # e2e (Playwright).
