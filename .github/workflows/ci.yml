name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # El nombre "checks" es load-bearing: el ruleset de protección de main lo
  # exige como status check. No renombrar sin actualizar el ruleset.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # lee packageManager de package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build
  # Jobs futuros los agrega su tarea: rls (0.2, requiere supabase local),
  # integration (0.6, requiere mock RCE), e2e (Playwright).
